<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | TDAgames</title>

  <!-- ✅ SEO Meta -->
  <meta name="description"
    content="Get in touch with TDAgames. Have questions or feedback about our free online games? We'd love to hear from you." />

  <meta property="og:title" content="Contact Us | TDAgames" />

  <meta property="og:image" content="https://blinkgames007.github.io/assets/logo.png" />

  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact Us | TDAgames" />
  <meta name="twitter:description"
    content="Contact the TDAgames team. We value player feedback and are here to help." />
  <meta name="twitter:image" content="https://blinkgames007.github.io/assets/logo.png" />

  <link rel="canonical" href="https://blinkgames007.github.io/contact.html" />

  <link rel="icon" href="favicon.png" type="image/png">

  <!-- ✅ JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "name": "Contact TDAgames",
    "url": "https://blinkgames007.github.io/contact.html",
    "description": "Contact the TDAgames team. We value player feedback and are here to help."
  }
  </script>

  <!-- Fonts + CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="brand">
      <div class="company-logo"></div>
      <h1 class="company-name">TDAgames</h1>
    </div>

    <!-- Home link replacing search -->
    <div class="home-link-wrapper">
      <a href="index.html" class="home-link">
        <span class="home-text">Home</span>
        <span class="home-icon">🏠</span>
      </a>
    </div>
  </header>


  <!-- ================= HERO ================= -->
  <section class="hero home-bg">
    <div class="hero-content">
      <h2>Contact Us</h2>
      <p class="hero-desc">We are here to help at <span class="company-name">TDAgames</span></p>
    </div>
  </section>
  <!-- ================= CONTACT FORM ================= -->
  <main>
    <section class="policy-container contact-container">
      <form id="contactForm">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email / Phone Number</label>
          <input type="text" id="email" name="email" placeholder="Enter your email or phone" required>
        </div>

        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" placeholder="Subject / Title of your message" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
      </form>
    </section>
  </main>

  <!-- ================= FOOTER ================= -->
  <footer class="site-footer">
    <div class="footer-container">
      <!-- Left -->
      <div class="footer-left">
        <div class="brand">
          <div class="company-logo"></div>
          <h2 class="company-name">TDAgames</h2>
        </div>
        <p class="dev-company">Developed by <span class="company-owner"></span></p>
        <div class="footer-socials" id="footer-socials"></div>
      </div>

      <!-- Right -->
      <div class="footer-right">
        <div class="footer-column">
          <h4>Get To Know Us</h4>
          <a href="about.html">About</a>
          <!-- <a href="#"><span class="company-name"></span> for Developers</a> -->
        </div>
        <div class="footer-column">
          <h4>Privacy and Terms</h4>
          <a href="privacypolicy.html">Privacy Center</a>
        </div>
        <div class="footer-column">
          <h4>Help and Support</h4>
          <!-- <a href="/faq.html">FAQ</a> -->
          <a href="contact.html">Contact US</a>
        </div>
      </div>
    </div>
    <p class="footer-bottom">
      &copy; <span id="year"></span> <span class="website-name"></span>. All rights reserved. <br>
      Powered by <strong><span class="company-owner"></span></strong>
    </p>
  </footer>

  <!-- ================= SCRIPTS ================= -->
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>

</html>
