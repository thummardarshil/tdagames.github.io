<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #43206f, #1c0936);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header, footer {
    width: 100%;
    flex-shrink: 0;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center; /* vertical centering */
    align-items: center;     /* horizontal centering */
    width: 100%;
    padding: 40px 20px;
    box-sizing: border-box;
  }

  .game-card {
    background-color: #1b0b3b;
    border-radius: 20px;
    overflow: hidden;
    max-width: 450px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    margin: 20px 0;
  }

  .game-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.7);
  }

  .game-card img { width: 100%; display: block; }

  .game-content { padding: 20px; color: #fff; }

  .game-title {
    font-size: 24px;
    font-family: 'Press Start 2P', cursive;
    margin-bottom: 15px;
    color: #fff;
  }

  .play-btn {
    display: inline-block;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.3s ease;
  }

  .play-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(255,75,43,0.6);
  }

  #banner1, #banner2 {
    width: 100%;
    max-width: 468px;
    min-height: 90px;
    margin: 20px 0;
    text-align: center;
  }

  @media (max-width: 768px) {
    .game-card { max-width: 90%; }
    .game-title { font-size: 20px; }
    .play-btn { width: 80%; padding: 12px 0; font-size: 16px; }
  }
